## 🌐 Stage 3 — Enable GitHub Pages

1. In your repo, go to **Settings** (top menu)
2. Scroll down on the left sidebar and click **"Pages"**
3. Under **"Branch"**, select **`gh-pages`** from the dropdown
4. Click **Save**

